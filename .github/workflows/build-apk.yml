name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # Permite ejecutar manualmente desde GitHub

jobs:
  build:
    runs-on: ubuntu-20.04 # Usar Ubuntu 20.04 para mejor compatibilidad

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9" # Python 3.9 es más estable con buildozer

      - name: 📦 Install Buildozer dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.36

      - name: 🔧 Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            openjdk-11-jdk \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev \
            build-essential \
            ccache \
            git \
            zip \
            unzip \
            wget

      - name: 🔨 Build APK with Buildozer
        working-directory: ./mobile
        run: |
          yes | buildozer android debug

      - name: 📱 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ventasapp-apk
          path: mobile/bin/*.apk
          retention-days: 30

      - name: ✅ Build complete
        run: |
          echo "✅ APK compilado exitosamente!"
          echo "📥 Descarga el APK desde la pestaña 'Actions' > 'Artifacts'"
